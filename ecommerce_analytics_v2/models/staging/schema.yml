version: 2

sources:
  - name: ecommerce_v2
    database: ecommerce_v2
    schema: public
    tables:
      - name: raw_products
      - name: raw_users
      - name: raw_carts

models:
  - name: stg_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: product_price
        tests:
          - not_null

  - name: stg_users
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: stg_carts
    columns:
      - name: cart_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null